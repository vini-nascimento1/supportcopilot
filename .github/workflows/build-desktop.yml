name: Build desktop shell

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      # electron-builder publishes the installers AND the latest*.yml update
      # metadata that electron-updater reads, to a GitHub Release for the tag
      # (created as a draft — publish it manually to roll the update out). Each
      # OS job appends its own artifacts to the same draft release.
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then npm run dist:linux -- --publish always; fi
          if [ "$RUNNER_OS" = "macOS" ]; then npm run dist:mac -- --publish always; fi
          if [ "$RUNNER_OS" = "Windows" ]; then npm run dist:win -- --publish always; fi
        shell: bash
